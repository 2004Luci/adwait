name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    # Use production env for main, staging for staging branch (enables branch-specific secrets)
    environment: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main') && 'production' || 'staging' }}
    env:
      ARCJET_KEY: ${{ secrets.ARCJET_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      APP_ENV: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main') && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
